# Cloud Build → Cloud Run. The deploy step MUST include --add-cloudsql-instances or
# every new revision will have no /cloudsql socket (ENOENT / "not reachable").
#
# Set trigger substitutions to match your Artifact Registry image (repo name, etc.).
substitutions:
  _SERVICE_NAME: docking
  _REGION: asia-east1
  _CORS_ORIGINS: https://docking-frontend-635955947416.asia-east1.run.app
  # Example: asia-east1-docker.pkg.dev/$PROJECT_ID/REPO/IMAGE:tag
  _AR_REPOSITORY: cloud-run-source-deploy
  _CLOUDSQL_INSTANCES: utility-grin-487808-f7:asia-east1:minigames-db

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - id: build-image
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_SERVICE_NAME}:$COMMIT_SHA"
      - "."

  - id: push-image
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_SERVICE_NAME}:$COMMIT_SHA"

  - id: deploy-cloud-run
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - "${_SERVICE_NAME}"
      - "--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_SERVICE_NAME}:$COMMIT_SHA"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--quiet"
      - "--add-cloudsql-instances=${_CLOUDSQL_INSTANCES}"
      - "--set-env-vars=CORS_ORIGINS=${_CORS_ORIGINS}"

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_SERVICE_NAME}:$COMMIT_SHA"
