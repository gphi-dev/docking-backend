# Cloud Build → Cloud Run. The deploy step MUST include --add-cloudsql-instances or
# every new revision will have no /cloudsql socket (ENOENT / "not reachable").
#
# Set trigger substitutions to match your Artifact Registry image (repo name, etc.).
substitutions:
  _SERVICE_NAME: docking
  _REGION: asia-east1
  _CORS_ORIGINS: https://docking-frontend-635955947416.asia-east1.run.app
  _GCS_BUCKET_NAME: ""
  _GCS_PROJECT_ID: "$PROJECT_ID"
  _GCS_PUBLIC_BASE_URL: ""
  _AWS_REGION: "ap-southeast-1"
  _AWS_S3_BUCKET: "gphi-docking-public"
  _AWS_S3_PUBLIC_URL: "https://gphi-docking-public.s3.ap-southeast-1.amazonaws.com"
  _AWS_ACCESS_KEY_ID_SECRET: "AWS_ACCESS_KEY_ID"
  _AWS_SECRET_ACCESS_KEY_SECRET: "AWS_SECRET_ACCESS_KEY"
  # Example: asia-east1-docker.pkg.dev/$PROJECT_ID/REPO/IMAGE:tag
  _AR_REPOSITORY: cloud-run-source-deploy
  _CLOUDSQL_INSTANCES: utility-grin-487808-f7:asia-southeast1:minigames-db
  _DB_NAME: main

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - id: build-image
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_SERVICE_NAME}:$COMMIT_SHA"
      - "."

  - id: push-image
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_SERVICE_NAME}:$COMMIT_SHA"

  - id: deploy-cloud-run
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - "${_SERVICE_NAME}"
      - "--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_SERVICE_NAME}:$COMMIT_SHA"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--quiet"
      - "--add-cloudsql-instances=${_CLOUDSQL_INSTANCES}"
      - "--update-env-vars=CORS_ORIGINS=${_CORS_ORIGINS},DB_NAME=${_DB_NAME},DB_SOCKET_PATH=/cloudsql/${_CLOUDSQL_INSTANCES},GCS_BUCKET_NAME=${_GCS_BUCKET_NAME},GCS_PROJECT_ID=${_GCS_PROJECT_ID},GCS_PUBLIC_BASE_URL=${_GCS_PUBLIC_BASE_URL},AWS_REGION=${_AWS_REGION},AWS_S3_BUCKET=${_AWS_S3_BUCKET},AWS_S3_PUBLIC_URL=${_AWS_S3_PUBLIC_URL}"
      - "--update-secrets=AWS_ACCESS_KEY_ID=${_AWS_ACCESS_KEY_ID_SECRET}:latest,AWS_SECRET_ACCESS_KEY=${_AWS_SECRET_ACCESS_KEY_SECRET}:latest"

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_SERVICE_NAME}:$COMMIT_SHA"
